name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify

      - name: db integration tests
        run: pnpm test:db

      - name: build web
        run: pnpm --filter @vellum/web build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Placeholders so the Auth.js + Drizzle adapter init does not throw
          # at build-time. No connection is made during the build itself.
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: ci-build-placeholder-32-chars-aaaaaa
          AUTH_TRUST_HOST: 'true'
